services:
  voicebox:
    build: .
    container_name: voicebox
    restart: unless-stopped

    ports:
      - "17493:17493"

    volumes:
      - ./output:/app/data/generations
      - voicebox-data:/app/data
      - huggingface-cache:/home/voicebox/.cache/huggingface

    environment:
      - LOG_LEVEL=info
      - NUMBA_CACHE_DIR=/tmp/numba_cache

    networks:
      - voicebox-net

  voicebox-rocm:
    build:
      context: .
      dockerfile: Dockerfile.rocm
    container_name: voicebox-rocm
    restart: unless-stopped
    profiles: ["rocm"]

    ports:
      - "17493:17493"

    volumes:
      - ./output:/app/data/generations
      - voicebox-data:/app/data
      - huggingface-cache:/home/voicebox/.cache/huggingface
      # Persist MIOpen's tuned kernel DB so the iGPU doesn't re-search solvers
      # on every container restart (MIOPEN_USER_DB_PATH points here).
      - miopen-cache:/home/voicebox/.cache/miopen

    environment:
      - LOG_LEVEL=info
      - NUMBA_CACHE_DIR=/tmp/numba_cache
      # Pin the HSA target to the native gfx1151 ISA (Strix Halo). Harmless with
      # the gfx1151-specific wheels and matches the proven qwen3-tts-rocm setup.
      - HSA_OVERRIDE_GFX_VERSION=11.5.1
      # Where MIOpen stores its tuned per-config kernel DB (mounted volume above).
      - MIOPEN_USER_DB_PATH=/home/voicebox/.cache/miopen

    devices:
      - /dev/kfd
      - /dev/dri

    group_add:
      - video
      - "992"  # render group GID on host — matches /dev/kfd and /dev/dri/renderD128

    ipc: host
    shm_size: 8g

    networks:
      - voicebox-net

networks:
  voicebox-net:
    driver: bridge

volumes:
  voicebox-data:
  huggingface-cache:
  miopen-cache:
