services:
  voicebox:
    build: .
    container_name: voicebox
    restart: unless-stopped

    ports:
      - "17493:17493"

    volumes:
      - ./output:/app/data/generations
      - voicebox-data:/app/data
      - huggingface-cache:/home/voicebox/.cache/huggingface

    environment:
      - LOG_LEVEL=info
      - NUMBA_CACHE_DIR=/tmp/numba_cache

    networks:
      - voicebox-net

  voicebox-rocm:
    build:
      context: .
      dockerfile: Dockerfile.rocm
    container_name: voicebox-rocm
    restart: unless-stopped

    ports:
      - "17494:17493"

    volumes:
      - ./output:/app/data/generations
      - voicebox-rocm-data:/app/data
      - huggingface-cache:/home/voicebox/.cache/huggingface

    environment:
      - LOG_LEVEL=info
      - NUMBA_CACHE_DIR=/tmp/numba_cache

    devices:
      - /dev/kfd
      - /dev/dri

    group_add:
      - video

    ipc: host
    shm_size: 8g
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: ["gpu"]

    networks:
      - voicebox-net

networks:
  voicebox-net:
    driver: bridge

volumes:
  voicebox-data:
  voicebox-rocm-data:
  huggingface-cache:
