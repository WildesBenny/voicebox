services:
  voicebox:
    build:
      context: .
      args:
        PYTORCH_VARIANT: rocm
        RENDER_GID: 992
        VIDEO_GID: 44
        ROCM_VERSION: 7.2

    container_name: voicebox
    restart: unless-stopped

    ports:
      - "17493:17493"

    volumes:
      - ./output:/app/data/generations
      - voicebox-data:/app/data
      - huggingface-cache:/home/voicebox/.cache/huggingface

    environment:
      - LOG_LEVEL=info
      - NUMBA_CACHE_DIR=/tmp/numba_cache

      # Strix Halo (gfx1151)
      - HSA_OVERRIDE_GFX_VERSION=11.5.1

      # ROCm allocator tuning
      - PYTORCH_HIP_ALLOC_CONF=garbage_collection_threshold:0.8,max_split_size_mb:512

    networks:
      - voicebox-net

    devices:
      - /dev/kfd
      - /dev/dri

    group_add:
      - "992"
      - "44"

    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 16G

networks:
  voicebox-net:
    driver: bridge

volumes:
  voicebox-data:
  huggingface-cache: