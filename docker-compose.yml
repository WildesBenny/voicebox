services:
  voicebox:
    build: .
    container_name: voicebox
    restart: unless-stopped

    ports:
      - "17493:17493"

    volumes:
      - ./output:/app/data/generations
      - voicebox-data:/app/data
      - huggingface-cache:/home/voicebox/.cache/huggingface

    environment:
      - LOG_LEVEL=info
      - NUMBA_CACHE_DIR=/tmp/numba_cache

    networks:
      - voicebox-net

  voicebox-rocm:
    build:
      context: .
      dockerfile: Dockerfile.rocm
    container_name: voicebox-rocm
    restart: unless-stopped
    profiles: ["rocm"]
    user: "1000:1000"

    ports:
      - "17493:17493"

    volumes:
      - ./output:/app/data/generations
      - voicebox-data:/app/data
      - huggingface-cache:/home/voicebox/.cache/huggingface

    environment:
      - LOG_LEVEL=info
      - NUMBA_CACHE_DIR=/tmp/numba_cache
      - HIP_VISIBLE_DEVICES=all
      - HSA_VISIBLE_DEVICES=all
      - ROCR_VISIBLE_DEVICES=all
      - ROCM_PATH=/opt/rocm

    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri

    group_add:
      - video
      - render

    ipc: host
    shm_size: 8g
    privileged: true
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined

    networks:
      - voicebox-net

networks:
  voicebox-net:
    driver: bridge

volumes:
  voicebox-data:
  huggingface-cache:
